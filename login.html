<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Tournament Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h2>Esports Tournament</h2>
        <p>Login to Participate</p>

        <div class="textbox">
            <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">
        </div>

        <button class="btn" id="send-btn" onclick="sendOTP()">Send OTP</button>

        <div id="otp-section">
            <div class="textbox">
                <input type="text" id="otp" placeholder="Enter 6-Digit OTP" maxlength="6">
            </div>
            <button class="btn" onclick="verifyOTP()">Verify & Login</button>
        </div>
    </div>

    <script>
        function sendOTP() {
            var phone = document.getElementById('phone').value;
            if (phone.length === 10) {
                alert("OTP Sent Successfully to " + phone);
                document.getElementById('otp-section').style.display = 'block';
            } else {
                alert("Please enter a valid 10-digit mobile number!");
            }
        }

        function verifyOTP() {
            var otp = document.getElementById('otp').value;
            if (otp === "123456") {
                alert("Login Successful! Welcome to Tournament Hub.");
            } else {
                alert("Invalid OTP! Please try again.");
            }
        }
    </script>

</body>
</html>
